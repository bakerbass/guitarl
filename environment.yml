name: guitaRL_old
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.9
  
  # PyTorch (already in gen-audio-bench)
  - pytorch>=2.0.0
  - pytorch-cuda=11.8
  - torchvision
  - torchaudio
  
  # Audio processing
  - librosa>=0.10.0
  - soundfile>=0.12.0
  
  # Data processing
  - numpy>=1.23.0
  - pandas>=1.5.0
  
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Progress tracking
  - tqdm>=4.65.0
  
  # Pip packages
  - pip
  - pip:
    # RL libraries
    - gymnasium>=0.29.0
    - stable-baselines3[extra]>=2.0.0
    
    # OSC communication
    - python-osc>=1.8.0
    
    # Audio I/O
    - sounddevice>=0.4.6
    
    # Logging and monitoring
    - tensorboard>=2.14.0
    - wandb>=0.15.0
    
    # Configuration management
    - pyyaml>=6.0
    
    # Utilities
    - scikit-learn>=1.3.0
